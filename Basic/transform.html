<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transform</title>
    <style>
        .container {
            border: 2px solid black;
            height: 60vh;
            width: 60vw;
            display: flex;
            justify-content: center;
            align-items: center;
        }


        .box {
            border: 2px solid rgb(248, 57, 57);
            height: 150px;
            width: 150px;
            background-color: aqua;
            transform: translate(20px, 20px) rotateY(299deg) rotateX(319deg);
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="box"></div>
    </div>
</body>

</html>
