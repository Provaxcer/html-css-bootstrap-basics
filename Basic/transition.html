<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        .parent {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            background-color: rgb(19, 17, 17);
        }

        .box {
            height: 100px;
            width: 100px;
            background-color: rgb(248, 217, 79);
            /* transition-property: all; */
            /* transition-duration: 1s;
            transition-timing-function: ease-in-out;
            transition-delay: 1ms; */
            transition: all 500ms cubic-bezier(0.320, 0.060, 0.105, 0.915);
        }

        .box:hover {
            transform: rotate(50deg) scale(1.5);
        }
    </style>
</head>

<body>
    <div class="parent">
        <div class="box">

        </div>
    </div>
</body>

</html>
