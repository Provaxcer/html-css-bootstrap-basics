<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz</title>
    <link rel="stylesheet" href="quiz.css">
</head>

<body>
    <form>
        <div>
            <label for="name">Whats Your Name?</label>
        </div>
        <div>
            <input type="text" id="name" name="username" placeholder="Enter text Here">
        </div>

        <div>
            <label for="city">Whats Your City?</label>
            </div>

            <input type="text" id="city" name="city" placeholder="Enter text Here">
        

        <div>
            <label for="pin">Whats Your Pincode?</label>
        </div>
        <div>
            <input type="number" id="pin" name="pincode" placeholder="Enter Here">
        </div>

        <div>
            <input type="submit" name="submit">
        </div>
    </form>
</body>

</html>
