<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Santanu's Bookmark</title>
    <link rel="stylesheet" href="forms.css">

</head>

<body>
    <form>
        <div>
            <input type="number" id="san" name="username" placeholder="Enter name">
            <label for="san">Enter Username</label>
        </div>

        <div>
            <input type="text" name="number" id="num" placeholder="Enter number">
            <label for="num">Enter Your Phone Number</label>


            <h5>Enter Your Gender</h5>
            <input type="radio" name="gender" id="male">
            <label for="male">Male</label>

            <input type="radio" name="gender" id="fe">
            <label for="fe">Female</label>

            <div>
                <label for="area">Enter your hobies</label>
                <br>
                <textarea id="area" rows="6" cols="25" placeholder="Enter text"></textarea>
            </div>

            <h3>Enter Your Mobile Brand</h3>
            <select>
                <option value="Apple">Apple</option>
                <option value="Samsung">Samsung</option>
                <option value="Moto">Moto</option>
            </select>

            <br>
            <form action="/submit">
                <textarea name="comment" rows="4" cols="50">Enter your comment here...</textarea>
                <select name="fruits">
                  <option value="apple">Apple</option>
                  <option value="banana">Banana</option>
                  <option value="cherry">Cherry</option>
                </select>
                <input type="submit" value="Hi">
          </form>

    </form>
</body>

</html>
