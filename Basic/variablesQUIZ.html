<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Variable Quiz</title>
    <style>
        :root {
            --fcolor: rgb(255, 162, 162);
            --scolor: rgb(203, 203, 255);
            --tcolor: rgb(193, 234, 193);
        }

        * {
            margin: 2px;
            padding: 0;
        }

        ul {
            list-style: none;
            display: flex;

        }

        li {
            padding: 10px;
            border: 1px solid grey;
        }

        #fi {
            background-color: var(--fcolor);
        }
        #se {
            background-color: var(--scolor);
        }
        #th {
            background-color: var(--tcolor);
        }
    </style>
</head>

<body>
    <ul>
        <li id="fi">Home</li>
        <li id="se">About</li>
        <li id="th">Contact</li>
    </ul>
</body>

</html>
