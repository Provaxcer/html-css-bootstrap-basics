<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transition</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }

        .cont{
            background-color: orange;
            height: 300px;
            width: 800px;
        }

        .box{
            background-color: rgb(125, 125, 217);
            height: 80px;
            width: 80px;
            transition-property: transform;
            transition-duration: 1s;
            transition: all 500ms cubic-bezier(0.800, -0.005, 0.495, 0.870);;
            transition-delay: 300ms;
        }
        
        .box:hover{
            transform: translateX(80px) rotate(50deg);
        }
        

    </style>
</head>
<body>
    <div class="cont">
        <div class="box">

        </div>
    </div>
</body>
</html>
