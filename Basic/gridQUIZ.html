<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Exercise</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@400..800&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');

        * {
            margin: 0;
            padding: 0;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .main {
            border: 2px solid red;
            height: 80vh;
            width: 60vw;
            flex-wrap: wrap;
            display: grid;
            grid-template-rows: repeat(4, 1fr);
            grid-template-columns: repeat(3, 1fr);
        }

        .item {
            background-color: cadetblue;
            margin: 10px;
        }

        span {
            font-family: "Poppins", sans-serif;
            display: flex;
            justify-content: center;
            flex-direction: row;
            font-size: 15px;
        }

        ul {
            list-style: none;
            display: flex;
            align-items: end;
            justify-content: space-around;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="main">
            <span class="item item1">English
                <ul>
                    <li>Download 32 Bit</li>
                    <li>Download 64 Bit</li>
                </ul>
            </span>
            <span class="item item2">Deutch</span>
            <span class="item item3">Italiano</span>
            <span class="item item4">Espanol</span>
            <span class="item item5">franais</span>
            <span class="item item6">Portuges</span>
            <span class="item item7">China</span>
            <span class="item item8">Hello</span>
            <span class="item item8">Bye</span>
            <span class="item item8">ETETT</span>
        </div>
    </div>
</body>

</html>
