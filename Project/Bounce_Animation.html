<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bounce Animation</title>
    <style>
        .container {
            height: 60vh;
            width: 70vw;
            background-color: rgb(159, 159, 239);
            position: relative;
        }

        .box {
            position: absolute;
            left: 0px;
            bottom: 0px;
            height: 60px;
            width: 60px;
            background-color: bisque;
            border-radius: 50px;
            animation-name: sanu;
            transition-timing-function: ease;
            animation-duration: 5s;
            animation-delay: 0s;
            animation-iteration-count: infinite;
            animation-play-state: running;
        }

        @keyframes sanu {
            0% {}

            10% {
                transform: translateY(-40%) translateX(50%);
            }

            20% {
                transform: translateY(-60%) translateX(80%);
            }

            30% {
                transform: translateY(0) translateX(110%);
            }

            40% {
                transform: translateY(-90%) translateX(140%);
            }

            50% {
                transform: translateY(-50%) translateX(180%);
            }

            60% {
                transform: translateY(0) translateX(220%);
            }

            70% {
                transform: translateY(-120%) translateX(260%);
            }

            80% {
                transform: translateY(-80%) translateX(300%);
            }

            90% {
                transform: translateY(-40%) translateX(340%);
            }

            95% {
                transform: translateY(-0%) translateX(380%);
            }

            100% {
                transform: translateY(-160%) translateX(440%);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="box">

        </div>
    </div>
</body>

</html>
