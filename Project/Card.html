<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@400..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');

        * {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            background-color: rgb(227, 244, 245);
        }

        .card {
            position: relative;
            background-color: white;
            height: 550px;
            width: 350px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 18px;
            border: 2px solid rgb(227, 233, 233);
        }

        img {
            margin: 12px;
            height: 201px;
            width: 325px;
            border-radius: 18px;
        }

        .round1 {
            font-family: sans-serif;
            color: #5a5757;
            background-color: rgb(255, 255, 255);
            border: 1px solid rgb(159, 146, 146);
            padding: 5px;
            border-radius: 10px;
            position: absolute;
            height: 14px;
            width: 61px;
            left: 27px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .round2 {
            font-family: sans-serif;
            color: #5a5757;
            background-color: rgb(255, 255, 255);
            border: 1px solid rgb(159, 146, 146);
            padding: 5px;
            border-radius: 10px;
            position: absolute;
            height: 14px;
            width: 48px;
            left: 108px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        h1 {
            font-family: "Poppins", serif;
            font-weight: 500;
            height: fit-content;
            width: fit-content;
            position: absolute;
            top: 50%;
            left: 5%;
            background-color: white;
            color: rgb(35, 34, 34);
        }

        p {
            position: relative;
            height: 18%;
            width: 90%;
            top: 18%;
            left: 5%;
            font-family: "Poppins", serif;
            background-color: white;
            color: #5a5757;
        }

        .bottom {
            font-family: "Poppins", serif;
            color: #0277BD;
            background-color: #8fdbff;
            padding: 5px;
            border-radius: 50px;
            position: absolute;
            height: 26px;
            width: 106px;
            top: 91%;
            left: 33%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 12px;
            font-weight: 500;
        }
    </style>

</head>

<body>
    <div class="card">
        <img src="Card.jpg">
        <div class="round1">Nature</div>
        <div class="round2">Lake</div>
        <h1>Lake Side View</h1>
        <p>Lorem ipsum dolor, sit amet consectetur adipisicing elit. Consectetur consequuntur cumque fugit culpa, vitae
            ducimus ratione id aut at optio laboriosam praesentium. Reprehenderit, distinctio ullam.
        </p>
        <div class="bottom">Read More</div>
    </div>
</body>

</html>
